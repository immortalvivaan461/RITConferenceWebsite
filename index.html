<div class="mobile-menu" id="mobileMenu">

<section class="Hero-Section video-section">
    <video autoplay muted loop playsinline class="bg-video">
        <source src="/resource/video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <div class="content">
        <h1>Welcome to Conference 2026</h1>
        <p>Innovate • Inspire • Impact</p>
    </div>
</section>

<section class="counting">
    <div class="countdown-container">
        <div class="counting-heading">
            <h2 class="title">Conference Starts In  - </h2>
        </div>
    
        <div class="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <p>Days</p>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <p>Hours</p>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <p>Minutes</p>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <p>Seconds</p>
            </div>
        </div>
    </div>
</section>
    

    <script src="script.js"></script>
